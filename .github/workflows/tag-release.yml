name: Tag & Release

# Botón manual en Actions para forzar una versión CONCRETA (p.ej. saltar a 1.0.0), que es lo único
# que auto-release.yml no cubre: aquel calcula la versión de los commits, este la impone.
# Sincroniza package.json, commitea en main, crea el tag y publica.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versión sin la v, p.ej. 0.2.0"
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump version + tag
        run: |
          set -e
          npm version "${{ inputs.version }}" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v${{ inputs.version }} [skip ci]"
          git tag "v${{ inputs.version }}"
          git push origin main --follow-tags

  # Antes esto no existía: se daba por hecho que el push del tag dispararía release.yml, y NO lo
  # hace — un push con el GITHUB_TOKEN no dispara workflows (protección anti-bucle de GitHub), así
  # que el tag quedaba publicado sin instalables y había que lanzar el build a mano.
  publish:
    needs: tag
    uses: ./.github/workflows/release.yml
    with:
      tag: v${{ inputs.version }}
    permissions:
      contents: write
