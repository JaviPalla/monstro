name: Release

# Al publicar un tag v* : compila los binarios nativos (macOS + Windows) y crea
# la release con ellos. Lanzable también a mano desde la pestaña Actions.
#
# También es REUSABLE (workflow_call): auto-release.yml lo invoca pasándole el tag que acaba de
# crear. Se hace así y no dejando que el push del tag lo dispare porque **un push hecho con el
# GITHUB_TOKEN no dispara workflows** (protección anti-bucle de GitHub): encadenarlos dejaría tags
# publicados sin instalables.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: "Tag a construir y publicar (p.ej. v0.4.0)"
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dist: dist:mac
            artifact: macos
            files: |
              dist/*.dmg
              dist/*.zip
          - os: windows-latest
            dist: dist:win
            artifact: windows
            files: |
              dist/*.exe
    runs-on: ${{ matrix.os }}
    env:
      # Tag efectivo: el que nos pasa auto-release.yml, o el del push del tag.
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Invocados desde auto-release.yml el ref es `main`, así que hay que pedir el tag
          # explícitamente o construiríamos un commit distinto del que se publica.
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # El binario reporta app.getVersion() = version de package.json EN EL BUILD. Si el tag
      # apunta a un commit sin bumpear (o se hizo a mano), saldría 0.1.0. Estampamos aquí la
      # versión del propio tag (vX.Y.Z → X.Y.Z) para que SIEMPRE coincida, pase lo que pase.
      - name: Stamp version from tag
        if: startsWith(env.TAG, 'v')
        shell: bash
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version

      - name: Build ${{ matrix.artifact }}
        # --publish never: electron-builder NO publica (al ver el tag lo intentaría
        # y pediría GH_TOKEN); de la release se encarga el job `release` con softprops.
        run: npm run ${{ matrix.dist }} -- --publish never
        env:
          # Firma ad-hoc (mac.identity "-" en package.json): evita el "app dañada"
          # en Apple Silicon sin certificado. Desactivamos el auto-descubrimiento
          # para que no intente coger una identidad real del llavero del runner.
          # Para firma+notarización real, añade los secrets CSC_LINK/CSC_KEY_PASSWORD
          # y APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID y quita esta línea.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          # tag_name explícito: invocados desde auto-release.yml el ref es `main` y softprops
          # publicaría la release contra la rama en vez de contra el tag.
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Monstro ${{ inputs.tag || github.ref_name }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
